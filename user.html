<!DOCTYPE html>
<html>
<head>
    <title>Aura Nexus - Emergency Beacon</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
        
        body { margin: 0; background: #0b0c10; color: #45a29e; font-family: 'Outfit', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none; }
        .container { text-align: center; background: rgba(11, 12, 16, 0.85); backdrop-filter: blur(15px); padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid rgba(102, 252, 241, 0.15); width: 340px; position: relative; animation: fade-in 0.8s ease-out; z-index: 10; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        h1 { font-weight: 600; letter-spacing: 5px; color: #66fcf1; margin-bottom: 5px; }
        #version { font-size: 0.6em; color: #45a29e; background: rgba(11, 12, 16, 0.5); display: inline-block; padding: 4px 12px; border-radius: 50px; margin-bottom: 20px; letter-spacing: 1px; border: 1px solid rgba(102, 252, 241, 0.2); }
        
        .secure-badge { position: absolute; top: 15px; left: 15px; font-size: 0.6em; color: #66fcf1; display: flex; align-items: center; gap: 5px; opacity: 0.8; }
        .secure-badge svg { width: 10px; height: 10px; fill: #66fcf1; }
        
        .signout { position: absolute; top: 20px; right: 20px; color: #ff4e50; text-decoration: none; font-size: 0.8em; border: 1px solid rgba(255, 78, 80, 0.3); padding: 6px 14px; border-radius: 50px; transition: all 0.3s; }
        .signout:hover { background: rgba(255, 78, 80, 0.1); border-color: #ff4e50; }
        
        #recordBtn { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #ff4e50; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; margin: 20px auto; position: relative; z-index: 2; touch-action: none; }
        #recordBtn.recording { border-color: #66fcf1; background: rgba(102, 252, 241, 0.1); animation: pulse 1.5s infinite; }
        
        .mic-icon { width: 40px; height: 40px; fill: #ff4e50; transition: fill 0.3s;}
        #recordBtn.recording .mic-icon { fill: #66fcf1; }
        
        h1 { font-size: 1.5em; color: #66fcf1; margin: 0; }
        #version { font-size: 10px; color: #45a29e; margin-bottom: 5px; opacity: 0.7; }
        p { font-size: 0.9em; margin: 10px 0 20px; color: #c5c6c7; }
        
        #timer { font-family: monospace; font-size: 1.2em; color: #66fcf1; margin-bottom: 10px; display: none; }
        
        #status { margin-top: 20px; font-size: 0.8em; min-height: 40px; padding: 10px; border-radius: 8px; font-weight: bold;}
        .success { color: #66fcf1; background: rgba(102, 252, 241, 0.1); }
        .error { color: #ff4e50; background: rgba(255, 78, 80, 0.1); }
        
        #visualizer { width: 100%; height: 40px; background: #0b0c10; margin: 10px 0; border-radius: 4px; display: none; }
        #debug { font-size: 10px; color: #888; margin-top: 10px; height: 15px; overflow: hidden; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(102, 252, 241, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(102, 252, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(102, 252, 241, 0); }
        }

        .signout { position: absolute; top: 20px; right: 20px; color: #ff4e50; text-decoration: none; font-size: 0.8em; border: 1px solid #ff4e50; padding: 5px 10px; border-radius: 4px; z-index: 20; }
        
        #map { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; filter: brightness(0.4) grayscale(0.5); display: none; }
        .resp-marker { width: 30px; height: 30px; background: #66fcf1; border: 2px solid #0b0c10; display: flex; align-items: center; justify-content: center; color: #0b0c10; font-weight: bold; font-size: 10px; border-radius: 4px; box-shadow: 0 0 15px #66fcf1; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);}
        .user-pulse { border-radius: 50%; width: 20px; height: 20px; background: #ff4e50; box-shadow: 0 0 0 0 rgba(255, 78, 80, 1); animation: pulsing 1.5s infinite; }
        @keyframes pulsing { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 78, 80, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(255, 78, 80, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 78, 80, 0); } }
        
        .divider { margin: 25px 0; border-bottom: 1px solid rgba(102, 252, 241, 0.2); position: relative; }
        
        .divider { margin: 25px 0; border-bottom: 1px solid #333; position: relative; }
        .divider::after { content: "OR USE TEXT"; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: #1f2833; padding: 0 10px; font-size: 0.6em; color: #888; }
        
        #textAreaContainer { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
        #emergencyText { background: #0b0c10; border: 1px solid #45a29e; border-radius: 8px; color: #66fcf1; padding: 12px; font-family: inherit; font-size: 0.9em; resize: none; outline: none; height: 80px; transition: border-color 0.3s; }
        #emergencyText:focus { border-color: #66fcf1; }
        #sendTextBtn { background: #45a29e; color: #0b0c10; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        #sendTextBtn:hover { background: #66fcf1; }
    </style>
</head>
<body>
    <div id="map" aria-hidden="true"></div>
    <a href="/logout" class="signout">SIGN OUT</a>
    <div class="container" role="main">
        <div class="secure-badge">
            <svg viewBox="0 0 24 24"><path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/></svg>
            SECURE PROTOCOL
        </div>
        <h1>AURA NEXUS</h1>
        <div id="version">PROTOCOL v1.4.0 (Hackathon Edition)</div>
        <p id="guideText">Tap to start recording</p>
        
        <div id="timer" aria-live="polite">00:00</div>

        <button id="recordBtn" aria-label="Start Emergency Voice Recording" title="Tap to Record">
            <svg class="mic-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>

        <canvas id="visualizer"></canvas>

        <div class="divider"></div>

        <div id="textAreaContainer">
            <textarea id="emergencyText" placeholder="Briefly describe the emergency..."></textarea>
            <button id="sendTextBtn" onclick="sendTextData()">SEND TEXT REPORT</button>
        </div>

        <div id="status">Ready</div>
        <div id="debug"></div>
    </div>

    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        let mediaRecorder;
        let audioChunks = [];
        let lat = 0, lng = 0;
        let audioContext, analyser, dataArray, animationId;
        let recordingStartTime;
        let timerInterval;
        let map, userMarker, respMarker, trackInterval;

        window.addEventListener('load', () => {
            log("App Load. Secure: " + window.isSecureContext);
            if (!window.isSecureContext) {
                log("⛔ CRITICAL: INSECURE CONTEXT. MIC BLOCKED.");
                statusDiv.innerHTML = "<b style='color:#ff4e50'>ERROR: HTTPS REQUIRED</b><br>Browser blocks mic on http://";
                statusDiv.className = "error";
                btn.style.opacity = "0.3";
                btn.style.pointerEvents = "none";
            }
            if (!navigator.mediaDevices) {
                log("⛔ CRITICAL: navigator.mediaDevices is UNDEFINED.");
                statusDiv.innerHTML += "<br>Media API Missing.";
            }
        });

        navigator.geolocation.getCurrentPosition(pos => {
            lat = pos.coords.latitude;
            lng = pos.coords.longitude;
        });

        const btn = document.getElementById('recordBtn');
        const statusDiv = document.getElementById('status');
        const timerDiv = document.getElementById('timer');
        const guideText = document.getElementById('guideText');
        const debugDiv = document.getElementById('debug');
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');

        function log(msg) { debugDiv.textContent = msg; console.log(msg); }

        function playBeep(freq, duration = 0.1) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                const v = ctx.createOscillator();
                const g = ctx.createGain();
                v.type = "sine"; v.frequency.value = freq;
                g.gain.setValueAtTime(0.1, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                v.connect(g); g.connect(ctx.destination);
                v.start(); v.stop(ctx.currentTime + duration);
            } catch(e) {}
        }

        function updateTimer() {
            const now = Date.now();
            const diff = Math.floor((now - recordingStartTime) / 1000);
            const m = Math.floor(diff / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            timerDiv.textContent = `${m}:${s}`;
        }

        function startVisualizer(stream) {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') audioContext.resume();
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                canvas.style.display = 'block';

                function draw() {
                    animationId = requestAnimationFrame(draw);
                    analyser.getByteFrequencyData(dataArray);
                    canvasCtx.fillStyle = '#0b0c10';
                    canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    const barWidth = (canvas.width / bufferLength) * 2.5;
                    let x = 0;
                    for(let i = 0; i < bufferLength; i++) {
                        const barHeight = dataArray[i] / 4;
                        canvasCtx.fillStyle = `rgb(102, 252, 241)`;
                        canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                        x += barWidth + 1;
                    }
                }
                draw();
            } catch(e) { log("Viz error: " + e.message); }
        }

        async function toggleRecording() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                stopRecording();
            } else {
                startRecording();
            }
        }

        async function startRecording() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                log("Err: MediaDevices missing. Use HTTPS.");
                statusDiv.textContent = "HTTPS Required";
                statusDiv.className = "error";
                return;
            }
            playBeep(880, 0.15); // High beep
            log("Starting...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                startVisualizer(stream);
                
                let mimeType = 'audio/webm';
                if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4';
                else if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mimeType = 'audio/webm;codecs=opus';
                
                log("Format: " + mimeType);
                
                mediaRecorder = new MediaRecorder(stream.clone(), { mimeType });
                mediaRecorder.ondataavailable = e => { if(e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = sendData;
                
                audioChunks = [];
                mediaRecorder.start(100);
                
                recordingStartTime = Date.now();
                timerDiv.style.display = 'block';
                timerInterval = setInterval(updateTimer, 1000);
                
                btn.classList.add('recording');
                guideText.textContent = "Tap to finish";
                statusDiv.textContent = "RECORDING LIVE...";
                statusDiv.className = "";
            } catch (err) {
                log("Err: " + err.message);
                statusDiv.textContent = "Mic access denied.";
                statusDiv.className = "error";
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                playBeep(440, 0.15); // Lower beep
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(t => t.stop());
                
                clearInterval(timerInterval);
                cancelAnimationFrame(animationId);
                if(audioContext) audioContext.close();
                
                btn.classList.remove('recording');
                guideText.textContent = "Processing...";
            }
        }

        function initMap() {
            if (map) return;
            document.getElementById('map').style.display = 'block';
            map = L.map('map', {zoomControl: false}).setView([lat, lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            userMarker = L.marker([lat, lng], {icon: L.divIcon({className:'user-pulse', iconSize:[20,20]})}).addTo(map);
        }

        async function startTracking(responderId) {
            if (!responderId) return;
            if (trackInterval) clearInterval(trackInterval);
            trackInterval = setInterval(async () => {
                try {
                    const res = await fetch('/responders');
                    const responders = await res.json();
                    const r = responders.find(item => item.id === responderId);
                    if (r) {
                        if (!respMarker) {
                            const icon = L.divIcon({className: 'custom-div-icon', html: `<div class='resp-marker'>${r.category.substring(0,1)}</div>`, iconSize: [30, 30]});
                            respMarker = L.marker([r.lat, r.lng], {icon}).addTo(map);
                            const bounds = L.latLngBounds([[lat, lng], [r.lat, r.lng]]);
                            map.flyToBounds(bounds, {padding: [50, 50], duration: 1.5});
                        } else {
                            respMarker.setLatLng([r.lat, r.lng]);
                        }
                    }
                } catch(e) {}
            }, 5000);
        }

        async function sendData() {
            const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
            log("Final size: " + audioBlob.size + " bytes");
            
            if (audioBlob.size < 5000) {
                statusDiv.textContent = "Error: File too small (" + audioBlob.size + "b)";
                statusDiv.className = "error";
                guideText.textContent = "Tap to try again";
                return;
            }

            const ext = mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
            const formData = new FormData();
            formData.append('audio_file', audioBlob, `emergency.${ext}`);
            formData.append('lat', lat);
            formData.append('lng', lng);

            statusDiv.textContent = "ENCRYPTING & SENDING...";
            initMap(); // Start map on submission

            try {
                const response = await fetch('/dispatch', { method: 'POST', body: formData });
                if (response.ok) {
                    const data = await response.json();
                    statusDiv.innerHTML = `SUCCESS.<br>RESPONDER DISPATCHED`;
                    statusDiv.className = "success";
                    guideText.textContent = "Help is on the way";
                    startTracking(data.responder_id || data.incident_id); // Fallback logic
                } else {
                    statusDiv.textContent = "Server error.";
                    statusDiv.className = "error";
                }
            } catch (err) {
                statusDiv.textContent = "Network error.";
                statusDiv.className = "error";
            }
        }

        async function sendTextData() {
            const text = document.getElementById('emergencyText').value.trim();
            if (!text) {
                statusDiv.textContent = "Please enter text first.";
                statusDiv.className = "error";
                return;
            }

            const formData = new FormData();
            formData.append('text', text);
            formData.append('lat', lat);
            formData.append('lng', lng);

            statusDiv.textContent = "SENDING SECURE TEXT...";
            statusDiv.className = "";
            initMap();

            try {
                const response = await fetch('/dispatch', { method: 'POST', body: formData });
                if (response.ok) {
                    const data = await response.json();
                    statusDiv.innerHTML = `SUCCESS.<br>RESPONDER DISPATCHED`;
                    statusDiv.className = "success";
                    document.getElementById('emergencyText').value = "";
                    startTracking(data.responder_id);
                } else {
                    statusDiv.textContent = "Server error.";
                    statusDiv.className = "error";
                }
            } catch (err) {
                statusDiv.textContent = "Network error.";
                statusDiv.className = "error";
            }
        }

        btn.addEventListener('click', toggleRecording);
    </script>
</body>
</html>
